services:
  postgres:
    image: postgres:16
    container_name: def-postgres
    environment:
      POSTGRES_DB: def_learning
      POSTGRES_USER: def_user
      POSTGRES_PASSWORD: def_pass
    ports:
      - "5432:5432"
    volumes:
      - ../data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U def_user -d def_learning"]
      interval: 5s
      timeout: 5s
      retries: 10

  # bitnamilegacy/spark — unmaintained legacy copy of the old bitnami/spark image
  # (Bitnami moved versioned tags to bitnamilegacy in 2025). Migrating to the
  # official apache/spark image is a separate, optional hardening step.
  spark-master:
    image: bitnamilegacy/spark:3.5
    container_name: def-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
    ports:
      - "7077:7077"
      - "8080:8080"
      - "4040:4040"
    volumes:
      - ..:/workspace
      - ../data:/data:ro
    working_dir: /workspace

  spark-worker-1:
    image: bitnamilegacy/spark:3.5
    container_name: def-spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
    depends_on:
      - spark-master
    volumes:
      - ..:/workspace
      - ../data:/data:ro

  spark-worker-2:
    image: bitnamilegacy/spark:3.5
    container_name: def-spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
    depends_on:
      - spark-master
    volumes:
      - ..:/workspace
      - ../data:/data:ro

  kafka:
    image: apache/kafka:3.8.0
    container_name: def-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --- Module 09 cloud emulators (profile "cloud"; not started by plain `make up`) ---
  # Local-only S3 / GCS / Blob. No real cloud, no credentials, no spend.
  localstack:
    image: localstack/localstack:3
    container_name: def-localstack
    profiles: ["cloud"]
    environment:
      - SERVICES=s3
      - DEBUG=0
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: def-fake-gcs
    profiles: ["cloud"]
    command: ["-scheme", "http", "-port", "4443", "-public-host", "localhost:4443"]
    ports:
      - "4443:4443"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: def-azurite
    profiles: ["cloud"]
    # --skipApiVersionCheck: Azurite's supported API version lags the azure-storage
    # SDK shipped with adlfs; without this the client's newer x-ms-version is rejected.
    command:
      ["azurite-blob", "--blobHost", "0.0.0.0", "--blobPort", "10000", "--skipApiVersionCheck"]
    ports:
      - "10000:10000"
