version: 2

# The raw star-schema Parquet (from `make seed`) is registered as a dbt *source*.
# dbt-duckdb's external_location reads the files directly — no load step — and the
# {name} placeholder maps each table to its folder. This is the metadata layer a
# data catalog reads from.
sources:
  - name: raw
    description: "Retail star-schema Parquet generated by `make seed`."
    meta:
      external_location: "{{ var('parquet_dir') }}/{name}/**/*.parquet"
    tables:
      - name: fact_sales
        description: "Sales fact table (one row per sales line)."
      - name: dim_store
        description: "Store dimension."
      - name: dim_product
        description: "Product dimension."
      - name: dim_customer
        description: "Customer dimension."
      - name: dim_date
        description: "Date dimension."
